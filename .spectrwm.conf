# GENERAL
workspace_limit             = 22
focus_mode				    = default
focus_close					= previous
focus_close_wrap			= 1
focus_default				= last
spawn_position				= next
workspace_clamp				= 1
warp_focus					= 1
warp_pointer				= 0

# Window Decoration
border_width				= 3
color_focus					= rgb:71/71/71
color_focus_maximized		= rgb:2a/2a/2a
color_unfocus				= rgb:2a/2a/2a
color_unfocus_maximized		= rgb:2a/2a/2a
region_padding				= 0
tile_gap					= 0

# Region containment
# Distance window must be dragged/resized beyond the region edge before it is
# allowed outside the region.
boundary_width 			= 30

# Remove window border when bar is disabled and there is only one window in workspace
disable_border				= always

# BAR SETTINGS
bar_enabled                 = 1
bar_border_width            = 3
bar_color                   = rgb:2a/2a/2a
bar_color_selected[1]       = rgb:3a/3a/3a
bar_font_color_selected     = rgb:be/be/be
bar_border                  = rgb:2a/2a/2a
bar_border_unfocus          = rgb:2a/2a/2a
bar_font_color[1]           = rgb:be/be/be,rgb:63/7a/8a,rgb:aa/8f/7c,rgb:8b/8f/7e,rgb:98/7a/6b,rgb:87/79/79,rgb:93/7f/74,rgb:3a/3a/3a,rgb:9a/9a/9a
bar_font                    = SFMono:size=11:antialias=true,SF Mono:size=10:antialias=true,SF Mono:size=9:antialias=true:style=Regular Italic
bar_font_pua                = SFMono:size=11:antialias=true,Noto Serif CJK JP:style=Black:size=11
bar_action                  = ~/bin/spectrwm/baraction.sh
bar_action_expand           = 1
bar_justify                 = center
bar_format = +|3L +I +D +@fg=8;+S+@fg=6;  min +@fg=5;~ +@fg=0;+M  +@fg=5;|  +@fg=5;<+@fg=2;+C+@fg=5;>   +@fg=0;+W  +|2 %a,  %b %d   +@fg=0;~ +@fg=0;  %I:%M +@fg=8;%p +|3R +A
workspace_indicator         = listcurrent,listactive,markcurrent,markurgent
maximize_hide_bar           = 0
urgent_collapse             = 1

# Dialog box size ratio when using TRANSSZ quirk; 0.3 < dialog_ratio <= 1.0
dialog_ratio                = 0.6

# Customize workspace layout at start
layout 						= ws[10]:-4:0:1:0:horizontal

# Workspace names
name						= ws[1]:www
name						= ws[2]:dev
name						= ws[3]:dev2
name						= ws[4]:sys
name						= ws[5]:chat	# discord
name						= ws[6]:cal
name						= ws[7]:mus
name						= ws[8]:vid
name						= ws[9]:gfx
name						= ws[10]:dist	# distraction
name						= ws[11]:一
name						= ws[12]:二
name						= ws[13]:三
name						= ws[14]:四
name						= ws[15]:五
name						= ws[16]:六
name						= ws[17]:七
name						= ws[18]:八
name						= ws[19]:九
name						= ws[20]:十

# Mod key, (Windows key is Mod4) (Apple key on OSX is Mod2)
modkey = Mod4

# PROGRAMS
program[term] 				= uxterm

program[feh]			    = feh -g 700x393 --scale-down

program[term_float] 		= uxterm -T uxtermFloat
bind[term_float] 			= MOD+Return

# Menus & etc
program[bindings]           = sh -c "grep bind ~/.spectrwm.conf | tail -n +3 |  sed 's/.....//;s/\]//' | column -t | dmenu -i -l 12 -p "Key Bindings""
bind[bindings]              = MOD+Mod1+k

program[menu] 				= rofi -no-lazy-grab -show drun -theme launcher.rasi -m -4 -font "SF Mono 12"
bind[menu]					= MOD+m

program[powermenu]          = ~/bin/powermenu.sh
bind [powermenu] 			= MOD+Shift+q

program[lock]				= xlock
bind [lock] 				= MOD+Shift+Delete

program[window] 			= rofi -no-lazy-grab -show window -theme launcher.rasi -m -4 -font "SF Mono 12"
bind[window]             	= MOD+w

program[volume]            	= pavucontrol -t 3
bind[volume]               	= MOD+S

program[home_workspace] 	= wmctrl -s 0
bind[home_workspace] 		= MOD+Mod1+h

program[cmus_notify] 		= ~/.config/cmus/scripts/cmus-notification.sh
bind[cmus_notify] 			= MOD+Shift+n

program[weechat]            = uxterm -T weechat -e weechat
bind[weechat]               = MOD+Shift+o

program[keepmenu] 			= passmenu
bind[keepmenu] 				= MOD+y


# Applications
program[naut]				= nautilus
bind[naut]					= MOD+n

program[ranger] 			= uxterm -T ranger -e ranger 
bind[ranger] 				= MOD+f

program[aho]				= ahoviewer
bind[aho]					= MOD+g

program[anki] 				= anki
bind[anki] 					= MOD+Shift+a

program[nvim] 				= uxterm -T neovim -e nvim
bind[nvim] 					= MOD+Control+n

program[cmus] 				= uxterm -T music -e spt
bind[cmus] 					= MOD+c

program[screenshot]			= gnome-screenshot -i
bind[screenshot] 			= Print

program[scrot_select]		= gnome-screenshot -c -a 
bind[scrot_select]			= Control + Print

program[play-pause]			= playerctl play-pause
bind[play-pause]			= XF86AudioPlay

program[next]				= playerctl -p spotifyd next
bind[next]					= XF86AudioNext

program[prev]				= playerctl -p spotifyd previous
bind[prev]					= XF86AudioPrev

# QUIRKS
# xprop displays windows as "<instance>", "<class>"
quirk[.*:.*:cmus] 										= FLOAT
quirk[Anki:anki:Image Occlusion Enhanced - Add Mode] 	= FLOAT
quirk[Calcurse:calcurse:.*] 							= WS[6]
quirk[Chromium:.*:.*] 									= IGNORESPAWNWS + MINIMALBORDER
quirk[Firefox:Firefox:Firefox - Choose User Profile] 	= FLOAT
quirk[Gimp:.*:.*] 										= FLOAT
quirk[Gimp:gimp:GNU Image Manipulation Program] 		= MINIMALBORDER
quirk[Gnome-calculator:gnome-calculator] 				= FLOAT + FOCUSPREV
quirk[Gnome-screenshot:gnome-screenshot] 				= FLOAT
quirk[Lxappearance:lxappearance]   						= FLOAT
quirk[Lxpolkit:.*] 										= FLOAT
quirk[Pavucontrol:.*]               					= FLOAT
quirk[QjackCtl:qjackctl] 								= FLOAT
quirk[Steam.exe:Steam.exe] 								= WS[9]
quirk[Wpg:.*] 											= FLOAT
quirk[ahoviewer] 										= FLOAT 
quirk[cawbird:Cawbird] 									= FLOAT + WS[4] 
quirk[chromium:Chromium] 								= MINIMALBORDER
quirk[deluge::Deluge] 									= FLOAT + WS[8]
quirk[mpv] 												= FULLSCREEN + FOCUSPREV + ANYWHERE
quirk[nautilus] 										= FLOAT
quirk[pinentry-gtk-2:Pinentry-gtk-2] 					= FLOAT + FOCUSONMAP_SINGLE
quirk[ranger] 											= FLOAT
quirk[uxterm:.*:.*] 									= IGNORESPAWNWS # Fix weird border issue

# AUTOSTART
autorun = ws[1]:spotifyd --config-path "/home/json/.config/spotifyd/spotifyd.conf"
autorun = ws[1]:rclone mount google-drive: ~/drive/
autorun = ws[1]:/home/json/bin/mouse.sh
autorun = ws[1]:feh --no-fehbg --bg-center /home/json/walls/1606768929462.jpg
autorun = ws[1]:xset s on
autorun = ws[1]:xset dpms 0 0 300
autorun = ws[1]:fcitx
autorun = ws[1]:/usr/lib/geoclue-2.0/demos/agent
autorun = ws[5]:discord
autorun = ws[6]:uxterm -T calcurse -e calcurse

